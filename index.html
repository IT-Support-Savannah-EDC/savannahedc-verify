<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Verification | Savannah EDC</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#004DC2', secondary: '#5DB922', darkNavy: '#0A1931' },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- Card Container -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
        
        <!-- Top Header -->
        <div class="bg-darkNavy p-5 text-center flex items-center justify-center gap-3">
            <img src="assets/logo.png" alt="Logo" class="h-8 w-auto">
            <div class="text-left">
                <h1 class="text-base font-extrabold text-white tracking-wider leading-none">SAVANNAH EDC</h1>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Official Staff Verification</p>
            </div>
        </div>

        <!-- Dynamic Body Area -->
        <div class="p-6">
            
            <!-- 1. LOADING STATE -->
            <div id="state-loading" class="text-center py-8 space-y-3">
                <div class="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto"></div>
                <p class="text-xs font-bold text-slate-500">Checking credentials...</p>
            </div>

            <!-- 2. SUCCESS STATE (VERIFIED) -->
            <div id="state-valid" class="hidden space-y-5">
                <!-- Status Badge -->
                <div id="status-badge" class="flex items-center justify-between px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-xl">
                    <span class="text-xs font-extrabold text-emerald-700">VERIFIED EMPLOYEE</span>
                    <span id="badge-status-text" class="text-[10px] font-black px-2 py-0.5 bg-secondary text-white rounded">ACTIVE</span>
                </div>

                <!-- Bio Grid -->
                <div class="flex items-center gap-4">
                    <img id="staff-photo" src="" alt="Photo" class="w-24 h-32 object-cover rounded-xl border border-slate-200 bg-slate-100">
                    <div class="space-y-1">
                        <span id="staff-cadre" class="text-[9px] font-bold uppercase px-2 py-0.5 bg-blue-50 text-primary rounded"></span>
                        <h2 id="staff-name" class="text-base font-extrabold text-darkNavy leading-tight mt-1"></h2>
                        <p id="staff-title" class="text-xs text-slate-600 font-medium"></p>
                        <p id="staff-id" class="text-xs font-mono font-bold text-secondary mt-1"></p>
                    </div>
                </div>

                <!-- Info Box -->
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-1.5 text-xs">
                    <div class="flex justify-between"><span class="text-slate-400">Department:</span><span id="staff-dept" class="font-bold"></span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Issue Date:</span><span id="staff-issued" class="font-medium"></span></div>
                </div>
            </div>

            <!-- 3. ERROR / NOT FOUND STATE -->
            <div id="state-invalid" class="hidden text-center py-8 space-y-2">
                <div class="w-10 h-10 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto font-bold">✕</div>
                <h3 class="text-sm font-bold text-slate-800">Unverified Record</h3>
                <p class="text-xs text-slate-500">This ID card is invalid or has been revoked.</p>
            </div>

        </div>

        <div class="bg-slate-50 p-3 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400">&copy; 2026 Savannah Electricity Distribution Company</p>
        </div>
    </div>

    <!-- JavaScript logic to fetch data -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Read ?id=UUID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const uuid = urlParams.get('id');

            if (!uuid) {
                showState('invalid');
                return;
            }

            try {
                const response = await fetch(`/api/verify?id=${uuid}`);
                const result = await response.json();

                if (response.ok && result.found) {
                    const staff = result.staff;
                    // Populate UI
                    document.getElementById('staff-photo').src = `https://pub-your-r2-id.r2.dev/${staff.photo_r2_key}`; // Replace with your R2 URL
                    document.getElementById('staff-cadre').innerText = staff.cadre;
                    document.getElementById('staff-name').innerText = staff.full_name;
                    document.getElementById('staff-title').innerText = staff.designation;
                    document.getElementById('staff-id').innerText = staff.staff_id;
                    document.getElementById('staff-dept').innerText = staff.department;
                    document.getElementById('staff-issued').innerText = staff.issued_date;
                    
                    showState('valid');
                } else {
                    showState('invalid');
                }
            } catch (err) {
                showState('invalid');
            }
        });

        function showState(state) {
            document.getElementById('state-loading').classList.add('hidden');
            document.getElementById('state-valid').classList.add('hidden');
            document.getElementById('state-invalid').classList.add('hidden');
            
            document.getElementById(`state-${state}`).classList.remove('hidden');
        }
    </script>
</body>
</html>
